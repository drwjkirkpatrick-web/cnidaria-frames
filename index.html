<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="A mesmerizing jellyfish agent for Hermes">
    <title>Cnidaria Frames</title>
    <link rel="stylesheet" href="css/jellyfish.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001d2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cnidaria">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>
    <!--
      Cnidaria Frames — A Jellyfish Agent v1.3
      Procedural jellyfish with ambient particles, audio, flocking,
      feeding, predators, themes, personalities, voice, sync, seafloor,
      coral, manta rays, storms, plankton, breathing guide, achievements,
      lifecycle, analytics, water current, touch steering, and more.
    -->

    <!-- Loading splash screen -->
    <div id="splashScreen">
        <div class="splash-title">Cnidaria</div>
        <div class="splash-subtitle">Jellyfish Agent</div>
        <div class="splash-pulse"></div>
        <div class="splash-hint" style="margin-top:24px;font-size:11px;color:rgba(200,230,255,0.35);letter-spacing:0.1em;">Tap to start</div>
    </div>

    <!-- Main canvas fills the viewport -->
    <canvas id="jellyfishCanvas"></canvas>

    <!-- Status indicators -->
    <div id="netStatus" class="hidden">
        <span class="net-dot"></span>
        <span id="netText">online</span>
    </div>

    <div id="statusIndicator" class="hidden" role="status" aria-live="polite" aria-atomic="true">
        <span id="statusText">idle</span>
    </div>

    <!-- Bottom toolbar — always visible -->
    <nav id="bottomToolbar" aria-label="Jellyfish controls">
        <button id="btnPrev" title="Previous state" aria-label="Previous state"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <button id="btnNext" title="Next state" aria-label="Next state"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        <button id="btnTheme" title="Cycle theme" aria-label="Cycle theme"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
        <button id="btnAudio" title="Toggle ambient audio" aria-label="Toggle ambient audio"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg></button>
        <button id="btnCapture" title="Screenshot" aria-label="Take screenshot"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></button>
        <button id="btnSettings" title="Settings" aria-label="Open settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
    </nav>

    <!-- Voice listening indicator -->
    <div id="voiceStatus">
        <span class="voice-pulse"></span>
        <span>Listening…</span>
    </div>

    <!-- Achievement toast container -->
    <div id="achievementToast"></div>

    <!-- Accessibility live region -->
    <div id="ariaAnnouncer" class="sr-only" role="log" aria-live="polite" aria-atomic="true"></div>

    <!-- Scripts (v1.3: 22 modules, load-order matters) -->
    <script src="js/utils.js"></script>
    <script src="js/lunar-phase.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/personality.js"></script>
    <script src="js/state-manager.js"></script>
    <script src="js/limbic-bridge.js"></script>
    <script src="js/caustics.js"></script>
    <script src="js/ink-cloud.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/food-pellets.js"></script>
    <script src="js/predator.js"></script>
    <script src="js/gesture-handler.js"></script>
    <script src="js/voice-command.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/system-apis.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/settings-panel.js"></script>
    <script src="js/performance-monitor.js"></script>
    <script src="js/screensaver.js"></script>
    <script src="js/ws-bridge.js"></script>
    <!-- v1.3 new modules -->
    <script src="js/seafloor.js"></script>
    <script src="js/manta-ray.js"></script>
    <script src="js/plankton.js"></script>
    <script src="js/breathing-guide.js"></script>
    <script src="js/storm.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/audio-reactive.js"></script>
    <script src="js/lifecycle.js"></script>
    <script src="js/url-state.js"></script>
    <script src="js/water-current.js"></script>
    <script src="js/coral.js"></script>
    <script src="js/help-overlay.js"></script>
    <script src="js/changelog.js"></script>
    <script src="js/auto-dark.js"></script>
    <script src="js/touch-ripple.js"></script>
    <script src="js/idle-behavior.js"></script>
    <script src="js/jellyfish.js"></script>
    <script src="js/main.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('SW registered:', reg.scope);
                })
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>
</html>
