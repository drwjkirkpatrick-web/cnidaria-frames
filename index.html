<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="A mesmerizing jellyfish agent for Hermes">
    <title>Cnidaria Frames</title>
    <link rel="stylesheet" href="css/jellyfish.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001d2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cnidaria">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>
    <!--
      Cnidaria Frames — A Jellyfish Agent v1.3
      Procedural jellyfish with ambient particles, audio, flocking,
      feeding, predators, themes, personalities, voice, sync, seafloor,
      coral, manta rays, storms, plankton, breathing guide, achievements,
      lifecycle, analytics, water current, touch steering, and more.
    -->

    <!-- Loading splash screen -->
    <div id="splashScreen">
        <div class="splash-title">Cnidaria</div>
        <div class="splash-subtitle">Jellyfish Agent</div>
        <div class="splash-pulse"></div>
    </div>

    <!-- Main canvas fills the viewport -->
    <canvas id="jellyfishCanvas"></canvas>

    <!-- Status indicators -->
    <div id="netStatus" class="hidden">
        <span class="net-dot"></span>
        <span id="netText">online</span>
    </div>

    <div id="statusIndicator" class="hidden" role="status" aria-live="polite" aria-atomic="true">
        <span id="statusText">idle</span>
    </div>

    <!-- Simple controls -->
    <button id="modeToggle" title="Toggle jellyfish mode" aria-label="Toggle jellyfish mode">🔄</button>

    <!-- Voice listening indicator -->
    <div id="voiceStatus">
        <span class="voice-pulse"></span>
        <span>Listening…</span>
    </div>

    <!-- Achievement toast container -->
    <div id="achievementToast"></div>

    <!-- Accessibility live region -->
    <div id="ariaAnnouncer" class="sr-only" role="log" aria-live="polite" aria-atomic="true"></div>

    <!-- Scripts (v1.3: 22 modules, load-order matters) -->
    <script src="js/utils.js"></script>
    <script src="js/lunar-phase.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/personality.js"></script>
    <script src="js/state-manager.js"></script>
    <script src="js/limbic-bridge.js"></script>
    <script src="js/caustics.js"></script>
    <script src="js/ink-cloud.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/food-pellets.js"></script>
    <script src="js/predator.js"></script>
    <script src="js/gesture-handler.js"></script>
    <script src="js/voice-command.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/system-apis.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/settings-panel.js"></script>
    <script src="js/performance-monitor.js"></script>
    <script src="js/screensaver.js"></script>
    <script src="js/ws-bridge.js"></script>
    <!-- v1.3 new modules -->
    <script src="js/seafloor.js"></script>
    <script src="js/manta-ray.js"></script>
    <script src="js/plankton.js"></script>
    <script src="js/breathing-guide.js"></script>
    <script src="js/storm.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/audio-reactive.js"></script>
    <script src="js/lifecycle.js"></script>
    <script src="js/url-state.js"></script>
    <script src="js/water-current.js"></script>
    <script src="js/coral.js"></script>
    <script src="js/help-overlay.js"></script>
    <script src="js/changelog.js"></script>
    <script src="js/auto-dark.js"></script>
    <script src="js/touch-ripple.js"></script>
    <script src="js/idle-behavior.js"></script>
    <script src="js/jellyfish.js"></script>
    <script src="js/main.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('SW registered:', reg.scope);
                })
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>
</html>
